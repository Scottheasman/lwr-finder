<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<div id="map" style="height: 600px;"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([27.36, -82.40], 11);

// ✅ Satellite tiles
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 18
}).addTo(map);

// ✅ Farmers Market (Waterside Place — FIXED)
const FM = { lat: 27.3746, lng: -82.3995 };

L.marker([FM.lat, FM.lng])
  .addTo(map)
  .bindPopup("Waterside Place (Farmers Market)")
  .openPopup();

// ✅ Communities (accurate entrance-based coords)
const communities = [
  // Waterside
  {name:"LakeHouse Cove", lat:27.3789, lng:-82.4045},
  {name:"Kingfisher Estates", lat:27.3739, lng:-82.4032},
  {name:"Wild Blue", lat:27.3719, lng:-82.4099},
  {name:"Shellstone", lat:27.3770, lng:-82.3945},
  {name:"Emerald Landing", lat:27.3758, lng:-82.3990},
  {name:"Bungalow Walk", lat:27.3735, lng:-82.3965},
  {name:"Nautique", lat:27.3725, lng:-82.3985},
  {name:"Avanti", lat:27.3705, lng:-82.4015},

  // LWR Main
  {name:"Esplanade at Azario", lat:27.4526, lng:-82.3569},
  {name:"Lakewood National", lat:27.4236, lng:-82.3832},
  {name:"Lorraine Lakes", lat:27.4442, lng:-82.3712},
  {name:"Mallory Park", lat:27.4132, lng:-82.3952},
  {name:"Lake Club", lat:27.4263, lng:-82.3784},
  {name:"Star Farms", lat:27.4729, lng:-82.3795}
];

// ✅ Add markers + bounds
const bounds = [];

communities.forEach(c => {
  const marker = L.marker([c.lat, c.lng])
    .addTo(map)
    .bindPopup(c.name);

  bounds.push([c.lat, c.lng]);
});

// include Farmers Market in bounds
bounds.push([FM.lat, FM.lng]);

// ✅ Auto-fit map nicely
map.fitBounds(bounds, { padding:[40,40] });
</script>
