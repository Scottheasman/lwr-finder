<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LWR Community Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-green: #2d5a27; --hover-green: #3d7a35; --bg-gray: #f8f9fa; --border: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-gray); }

        /* Top Bar */
        header { background: var(--primary-green); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 20px; font-weight: bold; }

        /* Navigation Tabs */
        nav { display: flex; background: white; border-bottom: 1px solid var(--border); sticky: top; z-index: 1000; }
        nav button { flex: 1; padding: 12px; border: none; background: none; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; border-bottom: 3px solid transparent; }
        nav button.active { color: var(--primary-green); border-bottom: 3px solid var(--primary-green); }

        .container { padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Filter Chips Section */
        .filter-section { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); font-size: 11px; }
        .filter-row { margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .filter-label { font-weight: bold; color: #444; width: 80px; text-transform: uppercase; }
        .chip { padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; transition: 0.2s; }
        .chip.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }

        /* Community Cards - Exact Match to Screenshot */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 6px; border: 1px solid var(--border); padding: 15px; position: relative; display: flex; flex-direction: column; }
        .card-tag { position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
        .tag-entry { background: #e8f5e9; color: #2e7d32; }
        .tag-mid { background: #e3f2fd; color: #1565c0; }
        .tag-luxury { background: #fff3e0; color: #ef6c00; }
        .tag-ultra { background: #fce4ec; color: #c2185b; }

        .card h3 { margin: 0 0 5px; font-size: 16px; color: #333; }
        .card-sub { font-size: 11px; color: #888; margin-bottom: 10px; }
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-bottom: 10px; }
        .stat-group b { display: block; font-size: 13px; color: #222; }
        .stat-group span { font-size: 10px; color: #777; text-transform: uppercase; }

        .amenity-dots { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; }
        .dot { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #f0f0f0; color: #555; }

        /* Mortgage Sliders */
        .mortgage-panel { background: white; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .info-bar { background: #fffde7; padding: 15px; font-size: 12px; border-bottom: 1px solid #ffe082; }
        .calc-area { padding: 25px; }
        .slider-row { margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        .slider-row label { width: 150px; font-size: 12px; font-weight: bold; }
        input[type=range] { flex: 1; accent-color: var(--primary-green); }
        .val-display { width: 100px; text-align: right; font-weight: bold; color: var(--primary-green); }

        /* Map Fix */
        #map { height: 80vh; width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="logo">🌴 LWR Community Finder</div>
</header>

<nav>
    <button onclick="tab(event, 'Browse')" class="active">Browse</button>
    <button onclick="tab(event, 'Map')">Map</button>
    <button onclick="tab(event, 'Compare')">Compare</button>
    <button onclick="tab(event, 'Mortgage')">Mortgage</button>
    <button onclick="tab(event, 'Install')">Install</button>
</nav>

<div class="container">
    <!-- BROWSE TAB -->
    <div id="Browse" class="tab-content active">
        <div class="filter-section">
            <div class="filter-row"><span class="filter-label">Price Tier</span><div class="chip active">All</div><div class="chip">&lt;$500K</div><div class="chip">$500K-$1M</div><div class="chip">$1M-$2M</div><div class="chip">$2M+</div></div>
            <div class="filter-row"><span class="filter-label">District</span><div class="chip active">All</div><div class="chip">Waterside</div><div class="chip">LWR Main</div><div class="chip">Skye Ranch</div><div class="chip">Wellen Park</div></div>
        </div>
        <div class="card-grid" id="card-grid"></div>
    </div>

    <!-- MAP TAB (FIXED) -->
    <div id="Map" class="tab-content">
        <div id="map"></div>
    </div>

    <!-- MORTGAGE TAB -->
    <div id="Mortgage" class="tab-content">
        <div class="mortgage-panel">
            <div class="info-bar">
                <b>2025 Florida Property Tax Rates</b> — Sarasota County: ~1.05-1.15% | Manatee County: ~1.25-1.45%
            </div>
            <div class="calc-area">
                <div class="slider-row"><label>Home Price</label><input type="range" id="priceS" min="300000" max="3000000" step="10000" value="750000" oninput="updateCalc()"><div class="val-display" id="priceV"></div></div>
                <div class="slider-row"><label>Down Payment %</label><input type="range" id="downS" min="0" max="50" value="20" oninput="updateCalc()"><div class="val-display" id="downV"></div></div>
                <div class="slider-row"><label>Interest Rate %</label><input type="range" id="rateS" min="3" max="10" step="0.1" value="6.8" oninput="updateCalc()"><div class="val-display" id="rateV"></div></div>
                
                <div id="total-result" style="font-size: 32px; color: var(--primary-green); font-weight: 800; text-align: center; padding: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const communities = [
        {name: "Avanti", dist: "Waterside", price: "$300s-$500s", tag: "ENTRY", sqft: "1,300-1,600", hoa: "$200-$300", drive: "4 min", lat: 27.376, lng: -82.404},
        {name: "LakeHouse Cove", dist: "Waterside", price: "$800s-$4M+", tag: "LUXURY", sqft: "1,764-3,426", hoa: "$340-$500", drive: "3 min", lat: 27.3787, lng: -82.4045},
        {name: "Kingfisher Estates", dist: "Waterside", price: "$3M-$10M+", tag: "ULTRA", sqft: "3,600-8,000", hoa: "$700-$900", drive: "9 min", lat: 27.3742, lng: -82.4020},
        {name: "Azario", dist: "LWR Main", price: "$400s-$1.5M", tag: "MID", sqft: "1,500-4,000", hoa: "$336-$612", drive: "14 min", lat: 27.4265, lng: -82.3835},
        {name: "Skye Ranch", dist: "Sarasota", price: "$498k-$1.2M", tag: "MID", sqft: "1,790-3,835", hoa: "$140", drive: "28 min", lat: 27.3185, lng: -82.3925}
        // ... (Remaining communities would be listed here)
    ];

    function tab(e, name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        e.target.classList.add('active');
        if(name === 'Map') { setTimeout(initMap, 200); }
    }

    function initMap() {
        if (window.lwrMap) return;
        window.lwrMap = L.map('map').setView([27.38, -82.39], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Satellite'
        }).addTo(window.lwrMap);

        communities.forEach(c => {
            L.marker([c.lat, c.lng]).addTo(window.lwrMap).bindPopup(`<b>${c.name}</b><br>${c.price}`);
        });
    }

    function renderCards() {
        const grid = document.getElementById('card-grid');
        grid.innerHTML = communities.map(c => `
            <div class="card">
                <span class="card-tag tag-${c.tag.toLowerCase()}">${c.tag}</span>
                <div class="card-sub">${c.dist} • LWR</div>
                <h3>${c.name}</h3>
                <div class="card-stats">
                    <div class="stat-group"><span>Price</span><b>${c.price}</b></div>
                    <div class="stat-group"><span>SQ FT</span><b>${c.sqft}</b></div>
                    <div class="stat-group"><span>HOA/MO</span><b>${c.hoa}</b></div>
                    <div class="stat-group"><span>Drive to Market</span><b>${c.drive}</b></div>
                </div>
                <div class="amenity-dots"><div class="dot">Drive 🛒</div><div class="dot">Maint-Free</div><div class="dot">Gated</div></div>
            </div>
        `).join('');
    }

    function updateCalc() {
        const p = priceS.value;
        const d = downS.value / 100;
        const r = rateS.value / 100 / 12;
        priceV.innerText = '$' + parseInt(p).toLocaleString();
        downV.innerText = downS.value + '%';
        rateV.innerText = rateS.value + '%';

        const loan = p * (1 - d);
        const pi = (loan * r) / (1 - Math.pow(1 + r, -360));
        const tax = (p * 0.0125) / 12;
        const total = pi + tax;

        document.getElementById('total-result').innerText = `Total / Month: $${Math.round(total).toLocaleString()}`;
    }

    renderCards();
    updateCalc();
</script>
</body>
</html>
