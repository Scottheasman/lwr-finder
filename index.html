<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LWR Map Test</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  #map {
    height: 100vh;
    width: 100%;
  }

  .header {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
</style>
</head>

<body>

<div class="header">🌴 LWR Community Map</div>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Initialize map
  const map = L.map('map').setView([27.4279, -82.3804], 13);

  // Tile layer (works everywhere)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Example data (replace with your communities)
  const communities = [
    {
      name: "Waterside Place",
      coords: [27.4279, -82.3804],
      color: "#6b3fa0"
    },
    {
      name: "LakeHouse Cove",
      coords: [27.4305, -82.3725],
      color: "#1a6b4a"
    },
    {
      name: "Wild Blue",
      coords: [27.4205, -82.3650],
      color: "#c47f1a"
    }
  ];

  // Add markers
  communities.forEach(c => {
    const marker = L.circleMarker(c.coords, {
      radius: 8,
      fillColor: c.color,
      color: "#fff",
      weight: 2,
      fillOpacity: 1
    }).addTo(map);

    marker.bindPopup(`<b>${c.name}</b>`);
  });

</script>

</body>
</html>
