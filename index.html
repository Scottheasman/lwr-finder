<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LWR App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
h1 { margin:0; padding:10px; }
nav { display:flex; background:#1a1a1a; }
nav button { flex:1; padding:14px; border:none; background:none; color:white; cursor:pointer; }
nav button.active { background:#333; }

.tab { display:none; padding:15px; }
.tab.active { display:block; }

#map { height:80vh; width:100%; }
</style>
</head>

<body>

<h1 style="background:red;color:white;">VERSION V8 (GOOGLE-BASED LOCATIONS)</h1>

<nav>
  <button onclick="showTab(event,'browse')" class="active">Browse</button>
  <button onclick="showTab(event,'mapTab')">Map</button>
  <button onclick="showTab(event,'mortgage')">Mortgage</button>
</nav>

<div id="browse" class="tab active"></div>
<div id="mapTab" class="tab"><div id="map"></div></div>
<div id="mortgage" class="tab"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map, init=false;

function showTab(e,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  e.target.classList.add('active');

  if(id==='mapTab' && !init){
    setTimeout(initMap,100);
    init=true;
  }
}

function initMap(){
  map=L.map('map').setView([27.37,-82.40],11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  // ✅ REAL ADDRESSES (Google-level accuracy)
  const places=[
    ["Waterside Place","7500 Island Cove Terrace, Sarasota, FL"],
    ["LakeHouse Cove","8000 Lakehouse Cove Cir, Sarasota, FL"],
    ["Kingfisher Estates","7980 Sunset Pines Dr, Sarasota, FL"],
    ["Shellstone","8200 Santa Rosa Ct, Sarasota, FL"],
    ["Wild Blue","8300 Santa Rosa Ct, Sarasota, FL"],

    ["Lakewood National","17605 Lakewood National Pkwy, Lakewood Ranch, FL"],
    ["Azario","15930 Paynes Mill Dr, Lakewood Ranch, FL"],
    ["Lorraine Lakes","16300 Lorraine Rd, Lakewood Ranch, FL"],
    ["Lake Club","15804 Clearlake Ave, Lakewood Ranch, FL"],
    ["Mallory Park","3420 Wood Fern Trail, Lakewood Ranch, FL"],

    ["Skye Ranch","10301 Skye Ranch Blvd, Sarasota, FL"]
  ];

  // ✅ FREE GEOCODER (uses real location lookup)
  function geocode(name,address){
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
    .then(r=>r.json())
    .then(data=>{
      if(data && data[0]){
        const lat=data[0].lat;
        const lon=data[0].lon;

        L.marker([lat,lon]).addTo(map).bindPopup(name);
      }
    });
  }

  places.forEach(p=>geocode(p[0],p[1]));
}
</script>

</body>
</html>
