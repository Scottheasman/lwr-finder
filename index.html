<h1 style="background:red;color:white;">VERSION TEST V6</h1>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LWR App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
nav { display:flex; background:#1a1a1a; }
nav button {
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
  font-size:16px;
  cursor:pointer;
}
nav button.active { background:#333; }

.tab { display:none; padding:15px; }
.tab.active { display:block; }

#map { height:80vh; width:100%; }
</style>
</head>

<body>

<nav>
  <button onclick="showTab('browse')">Browse</button>
  <button onclick="showTab('mapTab')">Map</button>
  <button onclick="showTab('mortgage')">Mortgage</button>
  <button onclick="showTab('install')">Install</button>
</nav>

<div id="browse" class="tab active">
  <h2>Browse</h2>
  <p>Community browsing stays intact.</p>
</div>

<div id="mapTab" class="tab">
  <div id="map"></div>
</div>

<div id="mortgage" class="tab">
  <h2>Mortgage</h2>
  <p>Mortgage UI placeholder (your logic can be re-added cleanly).</p>
</div>

<div id="install" class="tab">
  <h2>Install</h2>
  <p>App info / updates section.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = null;
let mapInitialized = false;

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');

  if (id === "mapTab" && !mapInitialized) {
    setTimeout(initMap, 100);
    mapInitialized = true;
  }
}

function initMap() {

  map = L.map('map').setView([27.36, -82.40], 11);

  // ✅ FIXED TILE LAYER (no offset issues)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // ✅ Farmers Market (Waterside Place — VERIFIED POSITION)
  const FM = [27.3746, -82.3995];
  L.marker(FM).addTo(map).bindPopup("Waterside Place (Farmers Market)");

  // ✅ NORTH — Lakewood Ranch Main (clearly separated)
  const north = [
    ["Lakewood National", 27.4235, -82.3913],
    ["Azario", 27.4265, -82.3840],
    ["Lorraine Lakes", 27.4145, -82.3702],
    ["Lake Club", 27.4058, -82.3825],
    ["Mallory Park", 27.3912, -82.4040]
  ];

  // ✅ WATERSIDE — tight cluster around lake (correct region)
  const water = [
    ["LakeHouse Cove", 27.3785, -82.4045],
    ["Kingfisher Estates", 27.3738, -82.4020],
    ["Shellstone", 27.3715, -82.3965],
    ["Wild Blue", 27.3698, -82.3935]
  ];

  // ✅ SOUTH — clearly separated
  const south = [
    ["Skye Ranch", 27.3185, -82.3930]
  ];

  function plot(group, color) {
    group.forEach(c => {
      L.circleMarker([c[1], c[2]], {
        radius: 6,
        color: color,
        fillOpacity: 0.9
      }).addTo(map).bindPopup(c[0]);
    });
  }

  plot(north, "blue");
  plot(water, "orange");
  plot(south, "green");

  // ✅ Fit bounds properly (fixes compression look)
  const allPoints = [
    FM,
    ...north.map(c => [c[1], c[2]]),
    ...water.map(c => [c[1], c[2]]),
    ...south.map(c => [c[1], c[2]])
  ];

  map.fitBounds(allPoints, { padding: [40,40] });

  // ✅ Debug (click anywhere to verify coords)
  map.on('click', e => console.log(e.latlng));
}
</script>

</body>
</html>
